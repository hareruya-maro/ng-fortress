pre-commit:
  parallel: true
  commands:
    protect-configs:
      run: npx tsx scripts/protect-config.ts {staged_files}
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
    oxlint:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx oxlint {staged_files}
